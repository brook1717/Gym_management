<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .error-card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; max-width: 450px; }
        .error-card h2 { color: #dc3545; margin-bottom: 16px; }
        .error-card p { color: #555; margin-bottom: 24px; }
        .error-card a { display: inline-block; padding: 10px 24px; background: #007bff; color: #fff; text-decoration: none; border-radius: 4px; }
        .error-card a:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="error-card">
        <h2>Something went wrong</h2>
        <p>{{ error|default:"An unexpected error occurred. Please try again later." }}</p>
        <a href="/">Return to Home</a>
    </div>
</body>
</html>
